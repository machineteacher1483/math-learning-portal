<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 3 Quiz: Linear Equations — MathPath</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-header{text-align:center;padding:40px 20px 32px;border-bottom:1px solid var(--border);margin-bottom:32px;}
    .q-counter{font-size:0.8rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;}
    .progress-wrap{background:var(--border);border-radius:99px;height:5px;margin:16px auto;max-width:400px;}
    .progress-fill{height:100%;background:var(--accent-green);border-radius:99px;transition:width 0.4s ease;width:0%;}
    .question-card{display:none;animation:fadeIn 0.3s ease;}
    .question-card.active{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .q-text{font-family:'Lora',serif;font-size:1.15rem;color:var(--ink);margin-bottom:24px;line-height:1.5;}
    .choices{display:flex;flex-direction:column;gap:10px;}
    .choice{display:block;width:100%;text-align:left;padding:14px 20px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--paper);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink-light);transition:all 0.15s;}
    .choice:hover:not(:disabled){border-color:var(--ink);background:var(--paper-warm);color:var(--ink);}
    .choice.correct{background:#e8faf1;border-color:var(--accent-green);color:#1a7a45;font-weight:600;}
    .choice.wrong{background:#fdf0f0;border-color:var(--accent);color:var(--accent);}
    .choice:disabled{cursor:default;}
    .explanation{margin-top:16px;padding:14px 18px;border-radius:var(--radius);font-size:0.9rem;display:none;}
    .explanation.show{display:block;}
    .explanation.correct-exp{background:#e8faf1;color:#1a7a45;border:1px solid #a8e6c1;}
    .explanation.wrong-exp{background:#fdf0f0;color:#8b1a1a;border:1px solid #f0a0a0;}
    .nav-btns{margin-top:24px;display:flex;justify-content:flex-end;}
    #results{display:none;text-align:center;padding:20px 0;}
    #results.show{display:block;}
    .score-ring{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Lora',serif;}
    .score-ring .big{font-size:2.8rem;font-weight:700;line-height:1;}
    .score-ring .small{font-size:0.85rem;opacity:0.7;}
    .score-A{background:#e8faf1;border:4px solid #27ae60;color:#1a7a45;}
    .score-B{background:#f0f6ff;border:4px solid #2980b9;color:#1a5a80;}
    .score-C{background:#fffbf0;border:4px solid #e67e22;color:#8b4a00;}
    .score-D{background:#fdf0f0;border:4px solid #c0392b;color:#8b1a1a;}
    .results-breakdown{text-align:left;margin-top:28px;}
    .result-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);font-size:0.9rem;}
    .result-item:last-child{border-bottom:none;}
    .result-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
    .result-q{color:var(--ink);font-weight:500;}
    .result-a{color:var(--ink-faint);font-size:0.82rem;margin-top:3px;}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">Math<span>Path</span></a>
  <a href="index.html">Home</a>
  <a href="unit1-functions.html">Functions</a>
  <a href="unit2-quadratics.html">Quadratics</a>
  <a href="unit3-linear.html" class="active">Linear</a>
  <a href="practice.html">Practice</a>
</nav>

<div class="container" style="max-width:680px;">
  <div class="quiz-header">
    <div class="breadcrumb" style="justify-content:center;">
      <a href="unit3-linear.html">Unit 3: Linear Equations</a> <span>›</span> <span>Quiz</span>
    </div>
    <span class="tag tag-green" style="margin:10px auto;display:inline-block;">Unit 3 Checkpoint</span>
    <h1 style="font-size:1.9rem;">Linear Equations Quiz</h1>
    <p style="color:var(--ink-faint);font-size:0.9rem;">10 questions · No time limit · Instant feedback</p>
    <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
    <div class="q-counter" id="qcounter">Question 1 of 10</div>
  </div>
  <section id="quiz-section"></section>
  <section id="results">
    <div class="score-ring" id="scoreRing">
      <div class="big" id="scoreFrac"></div>
      <div class="small">correct</div>
    </div>
    <h2 id="scoreMsg" style="font-size:1.5rem;margin-bottom:8px;"></h2>
    <p id="scoreDetail" style="color:var(--ink-faint);margin-bottom:0;"></p>
    <div class="results-breakdown" id="breakdown"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap;">
      <button onclick="restart()" class="btn btn-accent">Retake Quiz</button>
      <a href="practice.html" class="btn btn-outline">More Practice</a>
      <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>
  </section>
</div>

<script>
const questions=[
  {q:"What is the slope of the line y = −3x + 7?",choices:["7","3","−3","1/3"],answer:2,exp:"In y=mx+b form, m is the slope. Here m=−3."},
  {q:"Find the slope through (2, 4) and (6, 12).",choices:["2","1/2","8","4"],answer:0,exp:"m=(12−4)/(6−2)=8/4=2."},
  {q:"What is the slope of a vertical line?",choices:["0","1","Undefined","−1"],answer:2,exp:"A vertical line has an undefined slope — you'd be dividing by zero in the rise/run formula."},
  {q:"Which equation has slope 2 and y-intercept −5?",choices:["y=−5x+2","y=2x−5","y=5x+2","2x+5y=0"],answer:1,exp:"Slope-intercept form: y=mx+b. m=2, b=−5 gives y=2x−5."},
  {q:"Write the equation of the line with slope 3 through (1, 4).",choices:["y=3x+4","y=3x+1","y=x+3","y=4x+1"],answer:1,exp:"Point-slope: y−4=3(x−1) → y=3x−3+4 → y=3x+1."},
  {q:"Two lines are parallel. What can you say about their slopes?",choices:["They are opposite","They are equal","They are reciprocals","They multiply to −1"],answer:1,exp:"Parallel lines have equal (identical) slopes and different y-intercepts."},
  {q:"What is the slope of a line perpendicular to y = 4x + 1?",choices:["4","−4","1/4","−1/4"],answer:3,exp:"The perpendicular slope is the negative reciprocal of 4, which is −1/4."},
  {q:"Solve the system: y = x + 2 and y = 3x − 4.",choices:["(3,5)","(3,6)","(5,3)","(2,4)"],answer:0,exp:"Set equal: x+2=3x−4 → 6=2x → x=3. Then y=3+2=5. Solution: (3,5). Check: 3(3)−4=5 ✓"},
  {q:"Solve by elimination: x + y = 10 and x − y = 2.",choices:["(6,4)","(4,6)","(5,5)","(8,2)"],answer:0,exp:"Add equations: 2x=12 → x=6. Then 6+y=10 → y=4. Solution: (6,4)."},
  {q:"A system of two linear equations gives 0 = 5 after solving. What does this mean?",choices:["x = 0 and y = 5","The system has no solution","The system has infinite solutions","There's a calculation error"],answer:1,exp:"When elimination or substitution gives a false statement (like 0=5), it means the lines are parallel and the system has no solution."}
];

let current=0,score=0,userAnswers=new Array(questions.length).fill(null);

function render(){
  const s=document.getElementById('quiz-section');s.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='question-card'+(i===0?' active':'');card.id='q'+i;
    const ans=userAnswers[i]!==null;
    card.innerHTML=`<section>
      <p class="q-text"><strong>${i+1}.</strong> ${q.q}</p>
      <div class="choices">${q.choices.map((c,ci)=>`
        <button class="choice ${ans?(ci===q.answer?'correct':(ci===userAnswers[i]?'wrong':'')):''}\"
          onclick="answer(${i},${ci})" ${ans?'disabled':''}>
          <span style="font-family:'JetBrains Mono',monospace;margin-right:10px;opacity:0.5;">${['A','B','C','D'][ci]}.</span> ${c}
        </button>`).join('')}</div>
      <div class="explanation ${ans?'show':''} ${ans?(userAnswers[i]===q.answer?'correct-exp':'wrong-exp'):''}">
        ${ans?`<strong>${userAnswers[i]===q.answer?'✓ Correct!':'✗ Incorrect.'}</strong> ${q.exp}`:''}
      </div>
      <div class="nav-btns">
        ${i>0?`<button class="btn btn-outline btn-sm" onclick="goTo(${i-1})" style="margin-right:8px;">← Prev</button>`:''}
        ${ans?(i<questions.length-1?`<button class="btn btn-primary btn-sm" onclick="goTo(${i+1})">Next →</button>`:`<button class="btn btn-accent" onclick="finish()">See Results →</button>`):''}
      </div></section>`;
    s.appendChild(card);
  });
  updateProgress();
}

function answer(qi,ci){if(userAnswers[qi]!==null)return;userAnswers[qi]=ci;if(ci===questions[qi].answer)score++;render();goTo(qi);}
function goTo(i){current=i;document.querySelectorAll('.question-card').forEach((c,idx)=>c.classList.toggle('active',idx===i));updateProgress();}
function updateProgress(){const a=userAnswers.filter(x=>x!==null).length;document.getElementById('progress').style.width=(a/questions.length*100)+'%';document.getElementById('qcounter').textContent=`Question ${current+1} of ${questions.length} · ${a} answered`;}
function finish(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('progress').style.width='100%';
  document.getElementById('qcounter').textContent='Quiz Complete!';
  const res=document.getElementById('results');res.classList.add('show');
  const pct=score/questions.length;const ring=document.getElementById('scoreRing');
  let msg,detail;
  if(pct>=0.9){ring.className='score-ring score-A';msg='Excellent!';detail='You\'ve mastered linear equations and systems. Great work!';}
  else if(pct>=0.7){ring.className='score-ring score-B';msg='Well done!';detail='Good understanding. Review any incorrect answers before moving on.';}
  else if(pct>=0.5){ring.className='score-ring score-C';msg='Getting there!';detail='Focus on slope, forms of a line, and systems of equations.';}
  else{ring.className='score-ring score-D';msg='Keep at it!';detail='Review Unit 3 lessons — especially slope and systems of equations.';}
  document.getElementById('scoreFrac').textContent=`${score}/${questions.length}`;
  document.getElementById('scoreMsg').textContent=msg;
  document.getElementById('scoreDetail').textContent=detail;
  document.getElementById('breakdown').innerHTML='<h2 style="margin-bottom:16px;">Review</h2>'+
    questions.map((q,i)=>{const c=userAnswers[i]===q.answer;return`<div class="result-item"><div class="result-icon">${c?'✅':'❌'}</div><div><div class="result-q">${q.q}</div><div class="result-a">${c?'Correct: ':'Your answer: '}<em>${q.choices[userAnswers[i]]}</em>${!c?` · Correct: <em>${q.choices[q.answer]}</em>`:''}</div></div></div>`;}).join('');
}
function restart(){current=0;score=0;userAnswers=new Array(questions.length).fill(null);document.getElementById('quiz-section').style.display='';document.getElementById('results').classList.remove('show');render();goTo(0);}
render();
</script>
</body>
</html>
